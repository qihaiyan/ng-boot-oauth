<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spring Authorization Server sample</title>
    <link rel="stylesheet" th:href="@{/assets/css/main.css}"/>
</head>
<body>
<div class="container mx-auto px-4 max-w-4xl">
    <div class="py-5 flex flex-col md:flex-row">
        <div class="md:w-5/12">
            <h2 class="text-2xl font-bold">Device Activation</h2>
            <p>Enter the activation code to authorize the device.</p>
            <div class="mt-5">
                <form th:action="@{/oauth2/device_verification}" method="post">
                    <div class="mb-3">
                        <label for="user_code" class="block text-sm font-medium mb-1">Activation Code</label>
                        <input type="text" id="user_code" name="user_code" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required autofocus>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Submit</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="md:w-7/12 mt-4 md:mt-0">
            <img src="/assets/img/devices.png" th:src="@{/assets/img/devices.png}" class="max-w-full h-auto" alt="Devices">
        </div>
    </div>
</div>
</body>
</html>
